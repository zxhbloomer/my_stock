<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBI策略交易分析</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 16px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
.header .stats { font-size: 12px; color: #8b949e; display: flex; gap: 16px; }
.header .stat-item { display: flex; gap: 4px; }
.header .stat-val { color: #e6edf3; font-weight: 500; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left panel */
.left-panel { width: 33.333%; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
.panel-header { background: #161b22; padding: 8px 12px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.panel-title { font-size: 13px; font-weight: 600; color: #e6edf3; }
.panel-count { font-size: 11px; color: #8b949e; background: #21262d; padding: 2px 6px; border-radius: 10px; }

/* Search & sort */
.controls { padding: 8px 12px; background: #0d1117; border-bottom: 1px solid #21262d; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
.search-box { width: 100%; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 5px 10px; color: #e6edf3; font-size: 12px; outline: none; }
.search-box:focus { border-color: #58a6ff; }
.sort-row { display: flex; gap: 4px; flex-wrap: wrap; }
.sort-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #8b949e; cursor: pointer; white-space: nowrap; }
.sort-btn:hover { border-color: #58a6ff; color: #58a6ff; }
.sort-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.sort-btn.asc::after { content: ' ↑'; }
.sort-btn.desc::after { content: ' ↓'; }

/* Stock list */
.stock-list { flex: 1; overflow-y: auto; }
.stock-list::-webkit-scrollbar { width: 4px; }
.stock-list::-webkit-scrollbar-track { background: #0d1117; }
.stock-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
.stock-item { padding: 8px 12px; border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.1s; display: flex; flex-direction: column; gap: 3px; }
.stock-item:hover { background: #161b22; }
.stock-item.selected { background: #1f2d3d; border-left: 3px solid #58a6ff; }
.stock-item .row1 { display: flex; justify-content: space-between; align-items: center; }
.stock-item .code { font-size: 11px; color: #8b949e; font-family: monospace; }
.stock-item .name { font-size: 13px; font-weight: 500; color: #e6edf3; }
.stock-item .total-ret { font-size: 13px; font-weight: 600; }
.stock-item .row2 { display: flex; gap: 10px; }
.stock-item .meta { font-size: 11px; color: #8b949e; }
.stock-item .meta span { color: #e6edf3; }
.pos { color: #f85149 !important; }
.neg { color: #3fb950 !important; }
.rank-badge { font-size: 10px; background: #21262d; color: #8b949e; padding: 1px 5px; border-radius: 3px; min-width: 28px; text-align: center; }
.rank-badge.top10 { background: #1f6feb; color: #fff; }
.rank-badge.top50 { background: #388bfd22; color: #58a6ff; }

/* Right panel */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.right-header { background: #161b22; padding: 10px 16px; border-bottom: 1px solid #30363d; flex-shrink: 0; }
.right-header .stock-title { font-size: 15px; font-weight: 600; color: #e6edf3; }
.right-header .stock-subtitle { font-size: 12px; color: #8b949e; margin-top: 2px; }

/* Summary cards */
.summary-cards { display: flex; gap: 10px; padding: 12px 16px; background: #0d1117; border-bottom: 1px solid #21262d; flex-shrink: 0; flex-wrap: wrap; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; min-width: 110px; flex: 1; }
.card .card-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.card .card-val { font-size: 18px; font-weight: 700; }
.card .card-sub { font-size: 11px; color: #8b949e; margin-top: 2px; }

/* Trade table */
.trade-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.trade-section-header { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
.trade-table-wrap { flex: 1; overflow-y: auto; }
.trade-table-wrap::-webkit-scrollbar { width: 4px; }
.trade-table-wrap::-webkit-scrollbar-track { background: #0d1117; }
.trade-table-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: #161b22; padding: 8px 12px; text-align: left; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #21262d; }
tbody tr:hover { background: #161b22; }
tbody td { padding: 7px 12px; color: #e6edf3; white-space: nowrap; }
.status-open { color: #d29922; background: #2d2a1a; padding: 2px 6px; border-radius: 3px; font-size: 11px; }
.status-closed { color: #8b949e; background: #21262d; padding: 2px 6px; border-radius: 3px; font-size: 11px; }

/* Empty state */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8b949e; gap: 8px; }
.empty-state .icon { font-size: 40px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* Scrollbar for stock list */
.stock-list { scrollbar-width: thin; scrollbar-color: #30363d #0d1117; }
</style>
</head>
<body>

<div class="header">
  <h1>📈 BBI策略交易分析</h1>
  <div class="stats">
    <div class="stat-item">股票数 <span class="stat-val" id="hdr-stocks">-</span></div>
    <div class="stat-item">总交易 <span class="stat-val" id="hdr-trades">-</span></div>
    <div class="stat-item">整体胜率 <span class="stat-val" id="hdr-winrate">-</span></div>
    <div class="stat-item">平均收益 <span class="stat-val" id="hdr-avgret">-</span></div>
  </div>
</div>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="panel-header">
      <span class="panel-title">股票汇总排名</span>
      <span class="panel-count" id="list-count">0</span>
    </div>
    <div class="controls">
      <input class="search-box" id="search" placeholder="搜索股票代码或名称..." oninput="filterAndRender()">
      <div class="sort-row">
        <button class="sort-btn active desc" id="btn-总收益率" onclick="setSort('总收益率')">总收益率</button>
        <button class="sort-btn" id="btn-平均收益率" onclick="setSort('平均收益率')">平均收益率</button>
        <button class="sort-btn" id="btn-胜率" onclick="setSort('胜率')">胜率</button>
        <button class="sort-btn" id="btn-交易次数" onclick="setSort('交易次数')">交易次数</button>
        <button class="sort-btn" id="btn-平均持有天数" onclick="setSort('平均持有天数')">持有天数</button>
      </div>
    </div>
    <div class="stock-list" id="stock-list"></div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel" id="right-panel">
    <div class="empty-state" id="empty-state">
      <div class="icon">📊</div>
      <p>点击左侧股票查看交易详情</p>
    </div>
    <div id="detail-view" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="right-header">
        <div class="stock-title" id="detail-title">-</div>
        <div class="stock-subtitle" id="detail-subtitle">-</div>
      </div>
      <div class="summary-cards" id="summary-cards"></div>
      <div class="trade-section">
        <div class="trade-section-header">
          <span>交易明细</span>
          <span id="trade-count-label" style="color:#e6edf3;"></span>
        </div>
        <div class="trade-table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>买入日期</th>
                <th>买入价</th>
                <th>卖出日期</th>
                <th>卖出价</th>
                <th>收益率</th>
                <th>持有天数</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="trade-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Data loading ──────────────────────────────────────────────────────────────
let summaryData = [];
let detailData = [];
let filteredSummary = [];
let currentSort = { key: '总收益率', dir: 'desc' };
let selectedCode = null;

// Map Chinese column names to JSON keys
const COL = {
  '交易次数': '交易次数',
  '平均收益率': '平均收益率',
  '总收益率': '总收益率',
  '胜率': '胜率',
  '平均持有天数': '平均持有天数',
};

async function loadData() {
  try {
    const [s, d] = await Promise.all([
      fetch('data_summary.json').then(r => r.json()),
      fetch('data_detail.json').then(r => r.json()),
    ]);
    summaryData = s;
    detailData = d;
    init();
  } catch(e) {
    // Fallback: try loading from window globals (if embedded)
    if (window.SUMMARY_DATA && window.DETAIL_DATA) {
      summaryData = window.SUMMARY_DATA;
      detailData = window.DETAIL_DATA;
      init();
    } else {
      document.body.innerHTML = '<div style="padding:40px;color:#f85149;font-size:14px;">数据加载失败。请确保 data_summary.json 和 data_detail.json 在同一目录下，并通过本地服务器访问（或使用 generate_html.py 生成内嵌版本）。<br><br>错误: ' + e.message + '</div>';
    }
  }
}

function init() {
  // Update header stats
  const allTrades = detailData.filter(r => r.status === '已平仓');
  const winTrades = allTrades.filter(r => parseFloat(r.return_pct) > 0);
  const avgRet = allTrades.length ? (allTrades.reduce((s,r) => s + parseFloat(r.return_pct), 0) / allTrades.length) : 0;

  document.getElementById('hdr-stocks').textContent = summaryData.length;
  document.getElementById('hdr-trades').textContent = allTrades.length;
  document.getElementById('hdr-winrate').textContent = allTrades.length ? (winTrades.length / allTrades.length * 100).toFixed(1) + '%' : '-';
  document.getElementById('hdr-avgret').textContent = avgRet.toFixed(2) + '%';
  document.getElementById('hdr-avgret').className = 'stat-val ' + (avgRet >= 0 ? 'pos' : 'neg');

  filterAndRender();
}

// ── Sort & Filter ─────────────────────────────────────────────────────────────
function setSort(key) {
  if (currentSort.key === key) {
    currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    currentSort.key = key;
    currentSort.dir = 'desc';
  }
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.remove('active', 'asc', 'desc');
  });
  const btn = document.getElementById('btn-' + key);
  if (btn) { btn.classList.add('active', currentSort.dir); }
  filterAndRender();
}

function filterAndRender() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filteredSummary = summaryData.filter(r =>
    !q || r.ts_code.toLowerCase().includes(q) || (r.name || '').toLowerCase().includes(q)
  );

  const k = currentSort.key;
  filteredSummary.sort((a, b) => {
    const av = parseFloat(a[k]) || 0;
    const bv = parseFloat(b[k]) || 0;
    return currentSort.dir === 'desc' ? bv - av : av - bv;
  });

  document.getElementById('list-count').textContent = filteredSummary.length;
  renderList();
}

// ── Render left list ──────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('stock-list');
  const html = filteredSummary.map((r, i) => {
    const rank = i + 1;
    const totalRet = parseFloat(r['总收益率']) || 0;
    const avgRet = parseFloat(r['平均收益率']) || 0;
    const winRate = parseFloat(r['胜率']) || 0;
    const trades = parseInt(r['交易次数']) || 0;
    const holdDays = parseFloat(r['平均持有天数']) || 0;
    const retClass = totalRet >= 0 ? 'pos' : 'neg';
    const retSign = totalRet >= 0 ? '+' : '';
    const rankClass = rank <= 10 ? 'top10' : rank <= 50 ? 'top50' : '';
    const isSelected = r.ts_code === selectedCode ? ' selected' : '';

    return `<div class="stock-item${isSelected}" onclick="selectStock('${r.ts_code}')">
      <div class="row1">
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="rank-badge ${rankClass}">${rank}</span>
          <span class="name">${r.name || r.ts_code}</span>
        </div>
        <span class="total-ret ${retClass}">${retSign}${totalRet.toFixed(1)}%</span>
      </div>
      <div class="row2">
        <span class="code">${r.ts_code}</span>
        <span class="meta">均收益 <span class="${avgRet>=0?'pos':'neg'}">${avgRet>=0?'+':''}${avgRet.toFixed(1)}%</span></span>
        <span class="meta">胜率 <span>${winRate.toFixed(0)}%</span></span>
        <span class="meta">交易 <span>${trades}次</span></span>
      </div>
    </div>`;
  }).join('');
  container.innerHTML = html;
}

// ── Select stock & show detail ────────────────────────────────────────────────
function selectStock(code) {
  selectedCode = code;
  renderList(); // re-render to update selected state

  const summary = summaryData.find(r => r.ts_code === code);
  const trades = detailData.filter(r => r.ts_code === code);

  if (!summary) return;

  document.getElementById('empty-state').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'flex';

  // Title
  document.getElementById('detail-title').textContent = `${summary.name || code}  ${code}`;
  const rank = filteredSummary.findIndex(r => r.ts_code === code) + 1;
  document.getElementById('detail-subtitle').textContent = `当前排名 #${rank} · 共 ${trades.length} 笔交易`;

  // Summary cards
  const totalRet = parseFloat(summary['总收益率']) || 0;
  const avgRet = parseFloat(summary['平均收益率']) || 0;
  const winRate = parseFloat(summary['胜率']) || 0;
  const tradeCount = parseInt(summary['交易次数']) || 0;
  const holdDays = parseFloat(summary['平均持有天数']) || 0;

  const closedTrades = trades.filter(r => r.status === '已平仓');
  const openTrades = trades.filter(r => r.status === '持有中');

  document.getElementById('summary-cards').innerHTML = `
    <div class="card">
      <div class="card-label">总收益率</div>
      <div class="card-val ${totalRet>=0?'pos':'neg'}">${totalRet>=0?'+':''}${totalRet.toFixed(2)}%</div>
      <div class="card-sub">累计所有交易</div>
    </div>
    <div class="card">
      <div class="card-label">平均收益率</div>
      <div class="card-val ${avgRet>=0?'pos':'neg'}">${avgRet>=0?'+':''}${avgRet.toFixed(2)}%</div>
      <div class="card-sub">每笔平均</div>
    </div>
    <div class="card">
      <div class="card-label">胜率</div>
      <div class="card-val ${winRate>=50?'pos':'neg'}">${winRate.toFixed(1)}%</div>
      <div class="card-sub">${closedTrades.filter(r=>parseFloat(r.return_pct)>0).length}/${closedTrades.length} 盈利</div>
    </div>
    <div class="card">
      <div class="card-label">交易次数</div>
      <div class="card-val">${tradeCount}</div>
      <div class="card-sub">${openTrades.length > 0 ? openTrades.length + '笔持有中' : '全部已平仓'}</div>
    </div>
    <div class="card">
      <div class="card-label">平均持有</div>
      <div class="card-val">${holdDays.toFixed(1)}</div>
      <div class="card-sub">天</div>
    </div>
  `;

  // Trade table
  document.getElementById('trade-count-label').textContent = `共 ${trades.length} 笔`;
  const tbody = document.getElementById('trade-tbody');
  tbody.innerHTML = trades.map((t, i) => {
    const ret = parseFloat(t.return_pct);
    const retClass = ret >= 0 ? 'pos' : 'neg';
    const retSign = ret >= 0 ? '+' : '';
    const statusHtml = t.status === '持有中'
      ? `<span class="status-open">持有中</span>`
      : `<span class="status-closed">已平仓</span>`;
    return `<tr>
      <td style="color:#8b949e">${i+1}</td>
      <td>${t.buy_date}</td>
      <td>${parseFloat(t.buy_price).toFixed(3)}</td>
      <td>${t.sell_date}</td>
      <td>${t.status === '持有中' ? '<span style="color:#8b949e">-</span>' : parseFloat(t.sell_price).toFixed(3)}</td>
      <td class="${retClass}" style="font-weight:600">${retSign}${ret.toFixed(2)}%</td>
      <td>${t.hold_days}天</td>
      <td>${statusHtml}</td>
    </tr>`;
  }).join('');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData();
</script>
